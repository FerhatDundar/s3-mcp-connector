name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Propose / cut release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-attach-assets:
    name: Build & attach release assets
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-server
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-server/go.mod
          cache-dependency-path: go-server/go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          BIN="s3-connector-server"
          [ "$GOOS" = "windows" ] && BIN="s3-connector-server.exe"
          go build -trimpath -ldflags="-s -w -X main.version=${{ needs.release-please.outputs.version }}" -o "$BIN" .
          echo "BIN=$BIN" >> "$GITHUB_ENV"

      - name: Assemble plugin bundle
        run: |
          set -euo pipefail
          NAME="s3-mcp-connector-plugin-${{ needs.release-please.outputs.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          STAGE="/tmp/$NAME"
          mkdir -p "$STAGE/plugin/.claude-plugin" "$STAGE/plugin/servers/go"
          cp "$BIN" "$STAGE/plugin/servers/go/"
          cp ../plugin/.claude-plugin/plugin.json "$STAGE/plugin/.claude-plugin/"
          cp ../plugin/.mcp.json "$STAGE/plugin/"
          cp ../README.md ../SETUP.md ../LICENSE "$STAGE/"
          ( cd /tmp && zip -r -q "${NAME}.zip" "$NAME" )
          mv "/tmp/${NAME}.zip" .
          echo "ZIP=${NAME}.zip" >> "$GITHUB_ENV"

      - name: Upload asset to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "go-server/${ZIP}" --repo "${{ github.repository }}" --clobber
